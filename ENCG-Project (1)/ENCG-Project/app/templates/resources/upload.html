{% extends 'base.html' %}
{% block title %}Partager une ressource – ENCG Study{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4">
          <i class="fas fa-upload me-2 text-success"></i>Partager une ressource
        </h4>
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label fw-semibold">Titre *</label>
            <input type="text" name="title" class="form-control"
                   placeholder="Ex: Cours Analyse S3 – Chapitre 2" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="Brève description…"></textarea>
          </div>
          <div class="row g-3 mb-3">
            <div class="col">
              <label class="form-label fw-semibold">Type</label>
              <select name="resource_type" class="form-select">
                <option value="">-- Type --</option>
                {% for t in resource_types %}
                <option value="{{ t }}">{{ t }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col">
              <label class="form-label fw-semibold">Matière</label>
              <input type="text" name="subject" class="form-control"
                     placeholder="Ex: Maths, Gestion…">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">École</label>
            <select name="school" class="form-select">
              <option value="">Toutes les écoles</option>
              {% for school in schools %}
              <option value="{{ school }}" {{ 'selected' if current_user.school == school }}>
                {{ school }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Fichier * <small class="text-muted">(PDF, DOC, PPT, TXT, images – max 16 Mo)</small></label>
            <input type="file" name="file" class="form-control"
                   accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.png,.jpg,.jpeg" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success flex-grow-1">
              <i class="fas fa-share me-1"></i>Partager
            </button>
            <a href="{{ url_for('resources.index') }}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
