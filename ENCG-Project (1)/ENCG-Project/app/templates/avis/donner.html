{% extends 'base.html' %}
{% block title %}Donner mon avis{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header">
        <h4 class="mb-0">
          {% if existant %}✏️ Modifier mon avis{% else %}💬 Donner mon avis{% endif %}
        </h4>
      </div>
      <div class="card-body">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-bold">Note globale</label>
            <div class="d-flex gap-3">
              {% for i in [1,2,3,4,5] %}
              <div class="form-check">
                <input class="form-check-input" type="radio" name="note" value="{{ i }}" id="note{{ i }}"
                  {% if existant and existant.note == i %}checked
                  {% elif not existant and i == 5 %}checked{% endif %}>
                <label class="form-check-label fs-5" for="note{{ i }}">
                  {% if i == 1 %}😞
                  {% elif i == 2 %}😐
                  {% elif i == 3 %}🙂
                  {% elif i == 4 %}😊
                  {% else %}🤩{% endif %}
                  {{ i }}
                </label>
              </div>
              {% endfor %}
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Catégorie</label>
            <select name="categorie" class="form-select">
              {% for code, label in categories %}
              <option value="{{ code }}"
                {% if existant and existant.categorie == code %}selected{% endif %}>
                {{ label }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Votre avis</label>
            <textarea name="contenu" class="form-control" rows="5"
              placeholder="Partagez votre expérience sur la plateforme..."
              required maxlength="1000">{% if existant %}{{ existant.contenu }}{% endif %}</textarea>
            <div class="form-text">Maximum 1000 caractères.</div>
          </div>

          <div class="mb-4 form-check">
            <input type="checkbox" name="is_public" id="is_public" class="form-check-input"
              {% if not existant or existant.is_public %}checked{% endif %}>
            <label class="form-check-label" for="is_public">
              Rendre mon avis visible par tous les étudiants
            </label>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              {% if existant %}Mettre à jour{% else %}Publier mon avis{% endif %}
            </button>
            <a href="{{ url_for('avis.index') }}" class="btn btn-outline-secondary">Annuler</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
