{% extends 'base.html' %}
{% block title %}Connexion – ENCG Study{% endblock %}

{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="fas fa-graduation-cap fa-3x text-primary mb-3"></i>
        <h3 class="fw-bold">ENCG Study Platform</h3>
        <p class="text-muted">Connectez-vous à votre espace</p>
      </div>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" placeholder="votre@email.com" required
                 value="{{ request.form.get('email', '') }}">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mot de passe</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" name="remember" id="remember" class="form-check-input">
          <label for="remember" class="form-check-label">Se souvenir de moi</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="fas fa-sign-in-alt me-2"></i>Se connecter
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        Pas encore de compte ?
        <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">S'inscrire</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
